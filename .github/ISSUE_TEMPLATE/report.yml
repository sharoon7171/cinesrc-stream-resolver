body:
  - type: textarea
    id: problem
    attributes:
      label: What needs fixing?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Commands, TMDB id, provider, and any error output.
    validations:
      required: true
